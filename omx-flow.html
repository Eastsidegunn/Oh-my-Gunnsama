<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>OMX Agent Flow</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Pretendard",-apple-system,system-ui,sans-serif;background:#0d1117;color:#c9d1d9;overflow:hidden;height:100vh}
#toolbar{position:fixed;top:0;left:0;right:0;height:44px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;padding:0 16px;z-index:100;gap:12px}
#toolbar .title{font-size:13px;font-weight:700;color:#f0f6fc}
#toolbar .hint{font-size:11px;color:#484f58}
#toolbar button{padding:4px 10px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;cursor:pointer}
#toolbar button:hover{background:#30363d}
#canvas{position:absolute;top:44px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
#canvas.dragging{cursor:grabbing}
#world{position:absolute;transform-origin:0 0}
.layer-label{position:absolute;font-size:11px;font-weight:700;color:#30363d;letter-spacing:1px}
.layer-line{position:absolute;left:0;height:1px;background:#1c2128;width:4000px}
.node{position:absolute;border-radius:10px;border:2px solid #30363d;padding:14px 18px;width:210px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.node:hover{border-color:#39d2c0;box-shadow:0 0 24px rgba(57,210,192,.12)}
.node.expanded{z-index:10;width:400px}
.node .name{font-size:14px;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.node .role{font-size:10.5px;color:#8b949e;line-height:1.5}
.node .badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600}
.b-sys{background:#1f3d3d;color:#39d2c0}.b-lead{background:#1f3d2a;color:#3fb950}.b-spec{background:#2d1f3d;color:#bc8cff}.b-exec{background:#1f2d3d;color:#58a6ff}.b-rev{background:#3d2e1f;color:#d29922}.b-user{background:#21262d;color:#58a6ff}
.node .detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #30363d;font-size:11.5px;line-height:1.65;white-space:pre-wrap;max-height:420px;overflow-y:auto;color:#8b949e}
.node.expanded .detail{display:block}
.n-sys{background:#0d1f1f;border-color:#1a6b6b}.n-lead{background:#0d2818;border-color:#1f6b3a}.n-spec{background:#1a0d2e;border-color:#4b1a8c}.n-exec{background:#0d1b2e;border-color:#1a4b8c}.n-rev{background:#2e1f0d;border-color:#8c6b1a}.n-user{background:#111;border-color:#58a6ff}
svg.arrows{position:absolute;top:0;left:0;width:5000px;height:4000px;pointer-events:none;z-index:5}
.arrow{fill:none;stroke-width:2;marker-end:url(#ah)}
.a-flow{stroke:#39d2c0;stroke-width:2.5}
.a-route{stroke:#3fb950;stroke-width:2;stroke-dasharray:8 4}
.a-phase{stroke:#d29922;stroke-width:2;stroke-dasharray:5 3}
.a-review{stroke:#bc8cff;stroke-width:1.5;stroke-dasharray:4 4}
.arrow-tag{font-family:"Pretendard",-apple-system,sans-serif;font-size:10px;pointer-events:none}
#legend{position:fixed;bottom:16px;right:16px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px 18px;font-size:11px;z-index:100;line-height:2.4}
#legend .li{display:flex;align-items:center;gap:8px}
#legend .lc{width:28px;height:3px;border-radius:2px}
</style>
</head>
<body>
<div id="toolbar">
<span class="title">OMX Agent Flow Map</span>
<span class="hint">드래그: 이동 · 스크롤: 줌 · 노드 클릭: 상세</span>
<button onclick="resetView()">리셋</button>
<button onclick="expandAll()">전체 펼치기</button>
<button onclick="collapseAll()">전체 접기</button>
</div>
<div id="canvas">
<div id="world">
<svg class="arrows" id="svg">
<defs>
<marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/></marker>
</defs>
</svg>
</div>
</div>
<div id="legend">
<div class="li"><div class="lc" style="background:#39d2c0"></div>요청/키워드 흐름</div>
<div class="li"><div class="lc" style="background:#3fb950"></div>라우팅 (role-router)</div>
<div class="li"><div class="lc" style="background:#d29922"></div>팀 phase 전이</div>
<div class="li"><div class="lc" style="background:#bc8cff"></div>리뷰/검증</div>
<div style="margin-top:4px;color:#484f58;font-size:10px">결과 반환은 요청의 역방향</div>
</div>
<script>
var L0=60, L1=380, L2=750, L3=1100, L4=1450;

var nodes = [
  // Layer 0 — User + Keywords
  {id:"user",x:700,y:L0,cls:"n-user",name:"사용자",badge:"입력",bcls:"b-user",
   role:"쿼리 + $keyword 입력",
   detail:"자연어 요청 또는 키워드 트리거\n\n키워드:\n  $ralph → 반복 루프\n  $team → 멀티 agent 팀\n  $autopilot → 자율 실행\n  $deep-interview → 구조화 질문\n  $ralplan → 계획 후 실행\n  $plan → 계획만\n\n키워드 없으면:\n  triage 분류기가 PASS/LIGHT/HEAVY 판정"},

  {id:"keyword",x:300,y:L0,cls:"n-sys",name:"Keyword Detector",badge:"시스템",bcls:"b-sys",
   role:"$keyword를 감지해서 워크플로우 진입.",
   detail:"regex로 사용자 입력 스캔\n\n우선순위:\n  $autopilot (10)\n  $ralph (9)\n  $team (8)\n  $deep-interview (8)\n  $ralplan (7)\n  $plan (6)\n\n최고 우선순위 매치 → 해당 skill 활성화\n매치 없으면 → triage로"},

  {id:"triage",x:1100,y:L0,cls:"n-sys",name:"Triage",badge:"시스템",bcls:"b-sys",
   role:"키워드 없을 때 요청 복잡도 3단계 분류.",
   detail:"━━ 3-lane 분류기 ━━\n\nPASS — 사소한 것\n  인사, 확인, 감사 등\n  → 그냥 통과\n\nLIGHT — 단일 agent\n  explore: 파일/심볼 검색\n  executor: 명확한 구현\n  designer: UI/UX 작업\n  researcher: 조사\n  → role-router로\n\nHEAVY — 복합 작업\n  $autopilot급 복잡도\n  → 자율 실행 모드\n\n판정 기준: 단어 수, 키워드, 문장 구조"},

  // Layer 1 — Orchestration
  {id:"orchestrator",x:700,y:L1,cls:"n-lead",name:"Team Orchestrator",badge:"리더",bcls:"b-lead",
   role:"팀 phase 관리. plan→prd→exec→verify→fix.",
   detail:"━━ Phase Pipeline (고정) ━━\n\nteam-plan → team-prd → team-exec\n  → team-verify → team-fix (루프)\n  → complete 또는 failed\n\n각 phase마다:\n  적합한 agent 할당\n  워커 수 조절 (scaling)\n  완료 조건 확인\n\nfix loop:\n  max_fix_attempts 초과 → failed\n\n━━ 워커 관리 ━━\n  tmux pane으로 병렬 실행\n  idle 감지 → nudge\n  leader activity 추적"},

  {id:"router",x:300,y:L1,cls:"n-sys",name:"Role Router",badge:"시스템",bcls:"b-sys",
   role:"태스크→agent 매핑. 키워드+의도 기반.",
   detail:"━━ 라우팅 알고리즘 ━━\n\n1단계: 의도 감지 (regex)\n  implementation/review/debug/\n  design/docs/build-fix/cleanup\n\n2단계: 고신뢰 패턴 매칭\n  BUILD_FIX → build-fixer (HIGH)\n  DEBUG → debugger (HIGH)\n  LOCAL_EXPLORE → explore (HIGH)\n  DESIGN → designer (HIGH)\n  REVIEW+SECURITY → security (HIGH)\n\n3단계: 키워드 카운트 폴백\n  2+ 매치 → HIGH confidence\n  1 매치 → MEDIUM\n  0 → LOW → phase 컨텍스트 폴백\n\nphase 힌트:\n  team-verify → verifier\n  team-fix → build-fixer\n  team-plan → planner"},

  {id:"ralph",x:1100,y:L1,cls:"n-sys",name:"Ralph Loop",badge:"시스템",bcls:"b-sys",
   role:"\"될 때까지 반복\" 자율 루프.",
   detail:"━━ Phase 상태 머신 ━━\n\nstarting → executing → verifying\n  → fixing → complete/failed/\n    blocked_on_user/cancelled\n\nmax_iterations: 50 (기본)\nultrawork: 500\n\n매 반복:\n  agent 실행\n  → 결과 검증\n  → 실패 시 fixing\n  → 다시 executing\n\n완료 조건:\n  agent가 \"완료\" 선언\n  + 검증 통과"},

  // Layer 2 — Leaders & Specialists
  {id:"analyst",x:0,y:L2,cls:"n-lead",name:"Analyst",badge:"리더",bcls:"b-lead",
   role:"요구사항 명확화, 수용 기준.",
   detail:"요구사항 분석\n숨겨진 제약 발견\n수용 기준 작성\n\nfrontier-orchestrator\nmedium effort"},

  {id:"planner",x:250,y:L2,cls:"n-lead",name:"Planner",badge:"리더",bcls:"b-lead",
   role:"태스크 순서 설계, 실행 계획.",
   detail:"목표 → 태스크 분해\n순서/의존성 설계\n위험 식별\n실행 계획 작성\n\nfrontier-orchestrator\nmedium effort"},

  {id:"architect",x:500,y:L2,cls:"n-spec",name:"Architect",badge:"전문가",bcls:"b-spec",
   role:"시스템 설계, 경계, 인터페이스.",
   detail:"경계와 인터페이스 식별\n장기 영향 평가\n트레이드오프 문서화\n\nread-only\nfrontier-orchestrator\nhigh effort"},

  {id:"verifier",x:750,y:L2,cls:"n-lead",name:"Verifier",badge:"리더",bcls:"b-lead",
   role:"완료 증거 검증, 주장 확인.",
   detail:"빌드/테스트/진단 증거 수집\n주장과 실제 일치 확인\n통과/실패 + 증거\n\nfrontier-orchestrator\nhigh effort"},

  {id:"critic",x:1000,y:L2,cls:"n-spec",name:"Critic",badge:"전문가",bcls:"b-spec",
   role:"계획/설계 비판적 검토.",
   detail:"약점 식별\n대안 제시\n위험 지적\n\nread-only\nfrontier\nhigh effort"},

  {id:"debugger",x:1250,y:L2,cls:"n-exec",name:"Debugger",badge:"실행자",bcls:"b-exec",
   role:"근본 원인 분석, 실패 진단.",
   detail:"에러 재현\n원인 추적\n격리 + 수정\n검증 후 보고\n\ndeep-worker\nhigh effort"},

  // Layer 3 — Executors
  {id:"executor",x:0,y:L3,cls:"n-exec",name:"Executor",badge:"실행",bcls:"b-exec",
   role:"코드 구현, 리팩토링.",
   detail:"태스크 할당 수신\n코드 작성/수정\n기존 패턴 따르기\n빌드/테스트 검증\n\ndeep-worker\nmedium effort"},

  {id:"test-eng",x:250,y:L3,cls:"n-exec",name:"Test Engineer",badge:"실행",bcls:"b-exec",
   role:"테스트 전략, 커버리지.",
   detail:"전략 수립\n테스트 작성\n커버리지 확인\n불안정 테스트 강화\n\ndeep-worker\nfrontier model"},

  {id:"build-fix",x:500,y:L3,cls:"n-exec",name:"Build Fixer",badge:"실행",bcls:"b-exec",
   role:"빌드/타입 에러 해결.",
   detail:"빌드 실패 분석\n수정\n빌드 재실행 검증\n\ndeep-worker\nhigh effort"},

  {id:"designer",x:750,y:L3,cls:"n-exec",name:"Designer",badge:"실행",bcls:"b-exec",
   role:"UX/UI 아키텍처.",
   detail:"UI 구조 설계\n컴포넌트 구현\n인터랙션 설계\n\ndeep-worker\nhigh effort"},

  {id:"simplifier",x:1000,y:L3,cls:"n-exec",name:"Simplifier",badge:"실행",bcls:"b-exec",
   role:"코드 정리, 리팩토링.",
   detail:"복잡도 분석\n단순화\n검증\n\ndeep-worker\nfrontier model"},

  {id:"explore-omx",x:1250,y:L3,cls:"n-spec",name:"Explore",badge:"검색",bcls:"b-spec",
   role:"빠른 코드베이스 탐색.",
   detail:"파일/심볼 매핑\n구조 파악\n\nfast-lane\nlow effort\nread-only"},

  // Layer 4 — Review & Support
  {id:"sec-rev",x:100,y:L4,cls:"n-rev",name:"Security",badge:"리뷰",bcls:"b-rev",
   role:"취약점, 인증/인가 감사.",
   detail:"취약점 스캔\n신뢰 경계 분석\n\nfrontier\nread-only"},

  {id:"qual-rev",x:400,y:L4,cls:"n-rev",name:"Quality",badge:"리뷰",bcls:"b-rev",
   role:"로직 결함, 안티패턴.",
   detail:"로직 검사\n유지보수성\n안티패턴 식별\n\nfrontier\nread-only"},

  {id:"writer",x:700,y:L4,cls:"n-exec",name:"Writer",badge:"실행",bcls:"b-exec",
   role:"문서, 마이그레이션 노트.",
   detail:"기존 문서 파악\n작성/수정\n\nfast-lane\nhigh effort"},

  {id:"researcher",x:1000,y:L4,cls:"n-spec",name:"Researcher",badge:"전문가",bcls:"b-spec",
   role:"외부 문서 조사.",
   detail:"외부 자료 탐색\n종합 보고\n\nfast-lane\nhigh effort"},
];

var arrows = [
  // User flow
  {from:"user",to:"keyword",cls:"a-flow",label:"$keyword 감지"},
  {from:"user",to:"triage",cls:"a-flow",label:"키워드 없으면"},
  {from:"user",to:"orchestrator",cls:"a-flow",label:"$team"},

  // System routing
  {from:"keyword",to:"ralph",cls:"a-flow",label:"$ralph/$autopilot"},
  {from:"keyword",to:"orchestrator",cls:"a-flow",label:"$team"},
  {from:"keyword",to:"router",cls:"a-flow",label:"기타 키워드"},
  {from:"triage",to:"router",cls:"a-flow",label:"LIGHT/HEAVY"},

  // Role router → agents
  {from:"router",to:"executor",cls:"a-route",label:"implementation"},
  {from:"router",to:"debugger",cls:"a-route",label:"debug"},
  {from:"router",to:"build-fix",cls:"a-route",label:"build/compile"},
  {from:"router",to:"designer",cls:"a-route",label:"design/UI"},
  {from:"router",to:"explore-omx",cls:"a-route",label:"explore"},
  {from:"router",to:"architect",cls:"a-route",label:"architecture"},
  {from:"router",to:"simplifier",cls:"a-route",label:"refactor"},
  {from:"router",to:"test-eng",cls:"a-route",label:"test"},

  // Team orchestrator → phase agents
  {from:"orchestrator",to:"planner",cls:"a-phase",label:"team-plan"},
  {from:"orchestrator",to:"analyst",cls:"a-phase",label:"team-prd"},
  {from:"orchestrator",to:"executor",cls:"a-phase",label:"team-exec"},
  {from:"orchestrator",to:"verifier",cls:"a-phase",label:"team-verify"},
  {from:"orchestrator",to:"build-fix",cls:"a-phase",label:"team-fix"},

  // Ralph → executor
  {from:"ralph",to:"executor",cls:"a-route",label:"executing phase"},
  {from:"ralph",to:"verifier",cls:"a-review",label:"verifying phase"},

  // Review relations
  {from:"verifier",to:"sec-rev",cls:"a-review",label:"보안 검증"},
  {from:"verifier",to:"qual-rev",cls:"a-review",label:"품질 검증"},
  {from:"critic",to:"planner",cls:"a-review",label:"계획 비판"},
  {from:"critic",to:"architect",cls:"a-review",label:"설계 비판"},
];

var scale=0.5, panX=40, panY=10;
var dragging=false, dsx, dsy, dpx, dpy;
var world=document.getElementById("world");
var canvas=document.getElementById("canvas");
var svg=document.getElementById("svg");

function getNodeRect(id){
  var el=world.querySelector('[data-id="'+id+'"]');
  if(!el)return null;
  return {l:parseInt(el.style.left),t:parseInt(el.style.top),w:el.offsetWidth,h:el.offsetHeight};
}

function render(){
  var oldN=world.querySelectorAll(".node,.layer-label,.layer-line");
  for(var i=0;i<oldN.length;i++) oldN[i].remove();
  var oldA=svg.querySelectorAll(".arrow,.arrow-tag,rect.tag-bg");
  for(var i=0;i<oldA.length;i++) oldA[i].remove();
  world.style.transform="translate("+panX+"px,"+panY+"px) scale("+scale+")";

  var layers=[
    {y:L0-20,t:"입력 + 분류"},
    {y:L1-20,t:"오케스트레이션"},
    {y:L2-20,t:"리더 + 전문가"},
    {y:L3-20,t:"실행자"},
    {y:L4-20,t:"리뷰 + 지원"}
  ];
  for(var i=0;i<layers.length;i++){
    var line=document.createElement("div");
    line.className="layer-line";line.style.top=layers[i].y+"px";
    world.appendChild(line);
    var lb=document.createElement("div");
    lb.className="layer-label";lb.style.left="-80px";lb.style.top=(layers[i].y+4)+"px";
    lb.textContent=layers[i].t;
    world.appendChild(lb);
  }

  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];
    var div=document.createElement("div");
    div.className="node "+n.cls+(n._expanded?" expanded":"");
    div.style.left=n.x+"px";div.style.top=n.y+"px";
    div.dataset.id=n.id;
    div.innerHTML='<div class="name">'+n.name+' <span class="badge '+n.bcls+'">'+n.badge+'</span></div><div class="role">'+n.role+'</div><div class="detail">'+esc(n.detail)+'</div>';
    div.onclick=(function(nn){return function(e){nn._expanded=!nn._expanded;render();e.stopPropagation()}})(n);
    world.appendChild(div);
  }

  setTimeout(function(){
    var usedLabels=[];
    for(var i=0;i<arrows.length;i++){
      var a=arrows[i];
      var fr=getNodeRect(a.from);
      var tr=getNodeRect(a.to);
      if(!fr||!tr)continue;

      var fx,fy,tx,ty;
      if(Math.abs(fr.t-tr.t)<50){
        if(tr.l>fr.l){fx=fr.l+fr.w;fy=fr.t+fr.h/2;tx=tr.l;ty=tr.t+tr.h/2}
        else{fx=fr.l;fy=fr.t+fr.h/2;tx=tr.l+tr.w;ty=tr.t+tr.h/2}
      } else if(tr.t>fr.t){
        fx=fr.l+fr.w/2;fy=fr.t+fr.h;tx=tr.l+tr.w/2;ty=tr.t;
      } else {
        if(tr.l<fr.l){fx=fr.l;fy=fr.t+fr.h*0.3;tx=tr.l+tr.w;ty=tr.t+tr.h*0.7}
        else{fx=fr.l+fr.w;fy=fr.t+fr.h*0.3;tx=tr.l;ty=tr.t+tr.h*0.7}
      }

      var offset=(i%5-2)*8;
      var path=document.createElementNS("http://www.w3.org/2000/svg","path");
      var dx=Math.abs(fx-tx), dy=Math.abs(fy-ty);
      if(dy>dx*0.8){
        var my=(fy+ty)/2+offset;
        path.setAttribute("d","M"+fx+","+fy+" C"+fx+","+my+" "+tx+","+my+" "+tx+","+ty);
      } else {
        var mx=(fx+tx)/2+offset;
        path.setAttribute("d","M"+fx+","+fy+" C"+mx+","+fy+" "+mx+","+ty+" "+tx+","+ty);
      }
      path.setAttribute("class","arrow "+a.cls);
      svg.appendChild(path);

      if(a.label){
        var lx=(fx+tx)/2, ly=(fy+ty)/2;
        for(var j=0;j<usedLabels.length;j++){
          if(Math.abs(usedLabels[j].x-lx)<80&&Math.abs(usedLabels[j].y-ly)<18) ly+=22;
        }
        usedLabels.push({x:lx,y:ly});
        var textLen=a.label.length*5.5+12;
        var rect=document.createElementNS("http://www.w3.org/2000/svg","rect");
        rect.setAttribute("x",lx-textLen/2);rect.setAttribute("y",ly-9);
        rect.setAttribute("width",textLen);rect.setAttribute("height",16);
        rect.setAttribute("rx","4");rect.setAttribute("fill","#0d1117");rect.setAttribute("stroke","#30363d");
        rect.setAttribute("stroke-width","1");rect.setAttribute("class","tag-bg");
        svg.appendChild(rect);
        var text=document.createElementNS("http://www.w3.org/2000/svg","text");
        text.setAttribute("x",lx);text.setAttribute("y",ly+3);
        text.setAttribute("class","arrow-tag");
        text.setAttribute("fill","#8b949e");text.setAttribute("font-size","10");
        text.setAttribute("text-anchor","middle");
        text.textContent=a.label;
        svg.appendChild(text);
      }
    }
  },20);
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
canvas.addEventListener("mousedown",function(e){
  if(e.target.closest(".node"))return;
  dragging=true;canvas.classList.add("dragging");
  dsx=e.clientX;dsy=e.clientY;dpx=panX;dpy=panY;
});
window.addEventListener("mousemove",function(e){if(!dragging)return;panX=dpx+(e.clientX-dsx);panY=dpy+(e.clientY-dsy);render()});
window.addEventListener("mouseup",function(){dragging=false;canvas.classList.remove("dragging")});
canvas.addEventListener("wheel",function(e){
  e.preventDefault();
  var d=e.deltaY>0?-0.05:0.05;
  var ns=Math.max(0.15,Math.min(2.5,scale+d));
  var rect=canvas.getBoundingClientRect();
  var mx=e.clientX-rect.left,my=e.clientY-rect.top;
  panX=mx-(mx-panX)*(ns/scale);panY=my-(my-panY)*(ns/scale);
  scale=ns;render();
},{passive:false});
function resetView(){scale=0.5;panX=40;panY=10;render()}
function expandAll(){for(var i=0;i<nodes.length;i++)nodes[i]._expanded=true;render()}
function collapseAll(){for(var i=0;i<nodes.length;i++)nodes[i]._expanded=false;render()}
render();
</script>
</body>
