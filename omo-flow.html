<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>OMO Agent Flow</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Pretendard",-apple-system,system-ui,sans-serif;background:#0d1117;color:#c9d1d9;overflow:hidden;height:100vh}
#toolbar{position:fixed;top:0;left:0;right:0;height:44px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;padding:0 16px;z-index:100;gap:12px}
#toolbar .title{font-size:13px;font-weight:700;color:#f0f6fc}
#toolbar .hint{font-size:11px;color:#484f58}
#toolbar button{padding:4px 10px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;cursor:pointer}
#toolbar button:hover{background:#30363d}
#canvas{position:absolute;top:44px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
#canvas.dragging{cursor:grabbing}
#world{position:absolute;transform-origin:0 0}
.layer-label{position:absolute;font-size:11px;font-weight:700;color:#30363d;letter-spacing:1px}
.layer-line{position:absolute;left:0;height:1px;background:#1c2128;width:3000px}
.node{position:absolute;border-radius:10px;border:2px solid #30363d;padding:16px 20px;width:220px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.node:hover{border-color:#58a6ff;box-shadow:0 0 24px rgba(88,166,255,.12)}
.node.expanded{z-index:10;width:400px}
.node .name{font-size:14px;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.node .role{font-size:11px;color:#8b949e;line-height:1.5}
.node .badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600}
.b-orch{background:#1f3d2a;color:#3fb950}.b-exec{background:#1f2d3d;color:#58a6ff}.b-read{background:#2d1f3d;color:#bc8cff}.b-plan{background:#3d2e1f;color:#d29922}.b-user{background:#21262d;color:#58a6ff}
.node .detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #30363d;font-size:11.5px;line-height:1.65;white-space:pre-wrap;max-height:420px;overflow-y:auto;color:#8b949e}
.node.expanded .detail{display:block}
.n-orch{background:#0d2818;border-color:#1f6b3a}.n-exec{background:#0d1b2e;border-color:#1a4b8c}.n-read{background:#1a0d2e;border-color:#4b1a8c}.n-plan{background:#2e1f0d;border-color:#8c6b1a}.n-user{background:#111;border-color:#58a6ff}
svg.arrows{position:absolute;top:0;left:0;width:5000px;height:4000px;pointer-events:none;z-index:5}
.arrow{fill:none;stroke-width:2;marker-end:url(#ah)}
.a-down{stroke:#d29922;stroke-width:2.5}
.a-delegate{stroke:#3fb950;stroke-width:2;stroke-dasharray:8 4}
.a-consult{stroke:#bc8cff;stroke-width:2;stroke-dasharray:5 3}
.a-cross{stroke:#8b949e;stroke-dasharray:3 3;opacity:.5}
.arrow-tag{font-family:"Pretendard",-apple-system,sans-serif;font-size:10px;pointer-events:none}
#legend{position:fixed;bottom:16px;right:16px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px 18px;font-size:11px;z-index:100;line-height:2.4}
#legend .li{display:flex;align-items:center;gap:8px}
#legend .lc{width:28px;height:3px;border-radius:2px}
</style>
</head>
<body>
<div id="toolbar">
<span class="title">OMO Agent Flow Map</span>
<span class="hint">드래그: 이동 · 스크롤: 줌 · 노드 클릭: 상세</span>
<button onclick="resetView()">리셋</button>
<button onclick="expandAll()">전체 펼치기</button>
<button onclick="collapseAll()">전체 접기</button>
</div>
<div id="canvas">
<div id="world">
<svg class="arrows" id="svg">
<defs>
<marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/></marker>
</defs>
</svg>
</div>
</div>
<div id="legend">
<div class="li"><div class="lc" style="background:#d29922"></div>사용자 요청 흐름</div>
<div class="li"><div class="lc" style="background:#3fb950"></div>위임 (task)</div>
<div class="li"><div class="lc" style="background:#bc8cff"></div>자문 요청</div>
<div style="margin-top:4px;color:#484f58;font-size:10px">결과 반환은 요청의 역방향</div>
</div>
<script>
// Wide spacing: 350px vertical, 300px+ horizontal
var L0=60, L1=400, L2=800, L3=1200;

var nodes = [
  {id:"user",x:700,y:L0,cls:"n-user",name:"사용자",badge:"입력",bcls:"b-user",
   role:"쿼리/명령 입력",
   detail:"자연어 요청, 키워드($ralph, $team), 명령(/start-work)\n\n예시:\n• \"auth 모듈 리팩토링 해줘\"\n• \"이 버그 고쳐\"\n• $ralph → 반복 루프\n• /start-work → 계획 실행"},

  {id:"prometheus",x:150,y:L1,cls:"n-plan",name:"Prometheus",badge:"계획가",bcls:"b-plan",
   role:"전략 계획만. 코드 안 짬.",
   detail:"━━ Phase 1: 인터뷰 ━━\n의도 분류:\n  Trivial / Refactoring / Build\n  Mid-sized / Collab / Arch / Research\nexplore+librarian 병렬 발사\n\n━━ Phase 2: 계획 생성 ━━\nTODO 등록 (plan-1~8)\nMetis 필수 상담\n자가 리뷰\n최종: 시작 vs Momus 리뷰\n\n\"넌 계획가다. 구현자가 아니다.\"\n출력: .sisyphus/plans/*.md"},

  {id:"sisyphus",x:620,y:L1,cls:"n-orch",name:"Sisyphus",badge:"메인",bcls:"b-orch",
   role:"메인 진입점. 판단→위임→검증.",
   detail:"━━ Phase 0: 의도 판별 ━━\n표면→진짜 의도 매핑\n분류: Trivial/Explicit/Exploratory/\n       Open-ended/Ambiguous\n관성 리셋 → 애매함 체크\n구현 조건 (동사+범위+대기없음)\n위임 체크 → 기본: 위임\n\n━━ Phase 1: 코드 파악 ━━\nDisciplined/Transitional/Chaotic/Greenfield\n\n━━ Phase 2A: 탐색 ━━\nexplore 2~5 + librarian 병렬\nCONTEXT/GOAL/DOWNSTREAM/REQUEST\n\n━━ Phase 2B: 구현 ━━\n위임 6파트\ntask_id 재사용 (토큰 70%↓)\n\n━━ Phase 2C: 실패 ━━\n3번→멈춤→Oracle→사용자\n\n━━ Phase 3: 완료 ━━\nTODO+진단+빌드"},

  {id:"atlas",x:1150,y:L1,cls:"n-orch",name:"Atlas",badge:"TODO",bcls:"b-orch",
   role:"TODO 리스트 병렬 위임+추적.",
   detail:"TODO 리스트 수신\n→ 각 항목을 task()로 위임\n→ 병렬 실행 + 완료 추적\n\n\"전문 agent들의 지휘자\""},

  {id:"momus",x:0,y:L2,cls:"n-read",name:"Momus",badge:"리뷰",bcls:"b-read",
   role:"계획 실행 가능성만 검증.",
   detail:"참조 존재? 시작 가능? QA?\n\nOKAY (80%면 충분)\nREJECT (최대 3개)\n\n\"승인 편향. 완벽주의 아님.\""},

  {id:"metis",x:300,y:L2,cls:"n-plan",name:"Metis",badge:"분석",bcls:"b-plan",
   role:"숨겨진 의도, AI 실패 지점.",
   detail:"의도 분류:\n  Refactoring→회귀방지\n  Build→패턴먼저\n  Mid-sized→슬롭방지\n  Arch→Oracle추천\n\n출력: Prometheus 지시서\n  MUST / MUST NOT"},

  {id:"oracle",x:600,y:L2,cls:"n-read",name:"Oracle",badge:"자문",bcls:"b-read",
   role:"아키텍처/디버깅 고난이도 추론.",
   detail:"Essential: 결론+계획+노력\nExpanded: 이유+주의점\nEdge: 에스컬레이션+대안\n\n• 최소주의\n• 60초 안에 핵심 파악\n\n⚠ 실행중→Sisyphus 블로킹"},

  {id:"hephaestus",x:900,y:L2,cls:"n-exec",name:"Hephaestus",badge:"딥 워커",bcls:"b-exec",
   role:"복잡한 구현 끝까지 자율 완수.",
   detail:"탐색 먼저\n→ 자율 실행 (다중 파일)\n→ 아키텍처는 Oracle에\n→ 완료까지 안 멈춤"},

  {id:"junior",x:1200,y:L2,cls:"n-exec",name:"Junior",badge:"경량",bcls:"b-exec",
   role:"위임 없이 직접 실행.",
   detail:"task() 금지\ncall_omo_agent만 허용\n(explore/librarian)\n\n카테고리+스킬 범위만"},

  {id:"explore",x:350,y:L3,cls:"n-read",name:"Explore",badge:"내부검색 FREE",bcls:"b-read",
   role:"코드베이스 내부 grep.",
   detail:"의도분석 → 병렬 3개+\nfiles + answer + next_steps\n\nLSP+AST grep+grep/glob\n\n⚠ 시키면 같은 검색 직접 금지"},

  {id:"librarian",x:800,y:L3,cls:"n-read",name:"Librarian",badge:"외부검색 CHEAP",bcls:"b-read",
   role:"외부 오픈소스/문서. 퍼마링크.",
   detail:"A:개념 B:구현 C:맥락 D:종합\nsitemap→타겟fetch\n모든 주장에 퍼마링크\n\nExplore=내부 Librarian=외부"},

  {id:"multimodal",x:1200,y:L3,cls:"n-read",name:"Multimodal",badge:"미디어",bcls:"b-read",
   role:"PDF/이미지 분석.",
   detail:"파일+목표 → 분석 → 추출\n원본 안 봄 = 토큰 절약"},
];

// Only forward arrows (no result returns)
// waypoints: intermediate points to route around nodes
var arrows = [
  // User → Layer 1
  {from:"user",to:"prometheus",cls:"a-down",label:"계획 요청"},
  {from:"user",to:"sisyphus",cls:"a-down",label:"일반 요청"},
  {from:"user",to:"atlas",cls:"a-down",label:"/start-work"},

  // Layer 1 cross
  {from:"prometheus",to:"sisyphus",cls:"a-down",label:"계획→실행"},

  // Sisyphus → Layer 2
  {from:"sisyphus",to:"oracle",cls:"a-consult",label:"아키텍처 자문 (블로킹)"},
  {from:"sisyphus",to:"metis",cls:"a-consult",label:"사전 분석"},
  {from:"sisyphus",to:"hephaestus",cls:"a-delegate",label:"복잡한 구현"},
  {from:"sisyphus",to:"junior",cls:"a-delegate",label:"task(category)"},

  // Prometheus → Layer 2
  {from:"prometheus",to:"metis",cls:"a-consult",label:"필수 갭 분석"},
  {from:"prometheus",to:"momus",cls:"a-consult",label:"선택적 리뷰"},

  // Atlas → Layer 2
  {from:"atlas",to:"junior",cls:"a-delegate",label:"각 TODO 항목"},

  // → Layer 3
  {from:"sisyphus",to:"explore",cls:"a-delegate",label:"탐색 2~5 병렬"},
  {from:"sisyphus",to:"librarian",cls:"a-delegate",label:"외부 조사 병렬"},
  {from:"sisyphus",to:"multimodal",cls:"a-delegate",label:"미디어 분석"},
  {from:"hephaestus",to:"explore",cls:"a-delegate",label:"맥락 수집"},
  {from:"hephaestus",to:"librarian",cls:"a-delegate",label:"참조 조사"},
  {from:"hephaestus",to:"oracle",cls:"a-consult",label:"설계 위임"},
  {from:"metis",to:"explore",cls:"a-delegate",label:"사전 탐색"},
  {from:"metis",to:"librarian",cls:"a-delegate",label:"사전 조사"},
  {from:"junior",to:"explore",cls:"a-cross",label:"탐색"},
  {from:"junior",to:"librarian",cls:"a-cross",label:"조사"},
];

var scale=0.55, panX=40, panY=10;
var dragging=false, dsx, dsy, dpx, dpy;
var world=document.getElementById("world");
var canvas=document.getElementById("canvas");
var svg=document.getElementById("svg");

function getNodeRect(id){
  var el=world.querySelector('[data-id="'+id+'"]');
  if(!el)return null;
  return {l:parseInt(el.style.left),t:parseInt(el.style.top),w:el.offsetWidth,h:el.offsetHeight};
}

function render(){
  var oldN=world.querySelectorAll(".node,.layer-label,.layer-line");
  for(var i=0;i<oldN.length;i++) oldN[i].remove();
  var oldA=svg.querySelectorAll(".arrow,.arrow-tag,rect.tag-bg");
  for(var i=0;i<oldA.length;i++) oldA[i].remove();
  world.style.transform="translate("+panX+"px,"+panY+"px) scale("+scale+")";

  // Layer guides
  var layers=[{y:L0-20,t:"사용자"},{y:L1-20,t:"오케스트레이터"},{y:L2-20,t:"전문가"},{y:L3-20,t:"작업자"}];
  for(var i=0;i<layers.length;i++){
    var line=document.createElement("div");
    line.className="layer-line";line.style.top=layers[i].y+"px";
    world.appendChild(line);
    var lb=document.createElement("div");
    lb.className="layer-label";lb.style.left="-80px";lb.style.top=(layers[i].y+4)+"px";
    lb.textContent=layers[i].t;
    world.appendChild(lb);
  }

  // Nodes
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];
    var div=document.createElement("div");
    div.className="node "+n.cls+(n._expanded?" expanded":"");
    div.style.left=n.x+"px";div.style.top=n.y+"px";
    div.dataset.id=n.id;
    div.innerHTML='<div class="name">'+n.name+' <span class="badge '+n.bcls+'">'+n.badge+'</span></div><div class="role">'+n.role+'</div><div class="detail">'+esc(n.detail)+'</div>';
    div.onclick=(function(nn){return function(e){nn._expanded=!nn._expanded;render();e.stopPropagation()}})(n);
    world.appendChild(div);
  }

  // Arrows with labels as background-boxed tags
  setTimeout(function(){
    // Track used label positions to avoid overlap
    var usedLabels=[];

    for(var i=0;i<arrows.length;i++){
      var a=arrows[i];
      var fr=getNodeRect(a.from);
      var tr=getNodeRect(a.to);
      if(!fr||!tr)continue;

      // Connection points: bottom-center of from → top-center of to
      var fx=fr.l+fr.w/2, fy=fr.t+fr.h;
      var tx=tr.l+tr.w/2, ty=tr.t;

      // If same layer (horizontal), use sides
      if(Math.abs(fr.t-tr.t)<50){
        if(tr.l>fr.l){fx=fr.l+fr.w;fy=fr.t+fr.h/2;tx=tr.l;ty=tr.t+tr.h/2}
        else{fx=fr.l;fy=fr.t+fr.h/2;tx=tr.l+tr.w;ty=tr.t+tr.h/2}
      }
      // If target is above (like hephaestus→oracle same layer), use sides
      else if(tr.t<fr.t && Math.abs(fr.t-tr.t)<400){
        if(tr.l<fr.l){fx=fr.l;fy=fr.t+fr.h*0.3;tx=tr.l+tr.w;ty=tr.t+tr.h*0.7}
        else{fx=fr.l+fr.w;fy=fr.t+fr.h*0.3;tx=tr.l;ty=tr.t+tr.h*0.7}
      }

      // Offset slightly based on arrow index to separate parallel arrows
      var offset=(i%3-1)*12;

      var path=document.createElementNS("http://www.w3.org/2000/svg","path");
      var dx=Math.abs(fx-tx), dy=Math.abs(fy-ty);

      if(dy>dx*0.8){
        // Mostly vertical: S-curve with offset
        var my1=fy+(ty-fy)*0.35+offset;
        var my2=fy+(ty-fy)*0.65+offset;
        path.setAttribute("d","M"+fx+","+fy+" C"+fx+","+my1+" "+tx+","+my2+" "+tx+","+ty);
      } else {
        // Mostly horizontal
        var mx=(fx+tx)/2+offset;
        path.setAttribute("d","M"+fx+","+fy+" C"+mx+","+fy+" "+mx+","+ty+" "+tx+","+ty);
      }
      path.setAttribute("class","arrow "+a.cls);
      svg.appendChild(path);

      // Label as boxed tag near the midpoint
      if(a.label){
        var lx=(fx+tx)/2;
        var ly=(fy+ty)/2;

        // Nudge to avoid other labels
        for(var j=0;j<usedLabels.length;j++){
          if(Math.abs(usedLabels[j].x-lx)<80 && Math.abs(usedLabels[j].y-ly)<18){
            ly+=22;
          }
        }
        usedLabels.push({x:lx,y:ly});

        // Background rect
        var textLen=a.label.length*5.5+12;
        var rect=document.createElementNS("http://www.w3.org/2000/svg","rect");
        rect.setAttribute("x",lx-textLen/2);rect.setAttribute("y",ly-9);
        rect.setAttribute("width",textLen);rect.setAttribute("height",16);
        rect.setAttribute("rx","4");rect.setAttribute("fill","#0d1117");rect.setAttribute("stroke","#30363d");
        rect.setAttribute("stroke-width","1");rect.setAttribute("class","tag-bg");
        svg.appendChild(rect);

        var text=document.createElementNS("http://www.w3.org/2000/svg","text");
        text.setAttribute("x",lx);text.setAttribute("y",ly+3);
        text.setAttribute("class","arrow-tag");
        text.setAttribute("fill","#8b949e");text.setAttribute("font-size","10");
        text.setAttribute("text-anchor","middle");
        text.textContent=a.label;
        svg.appendChild(text);
      }
    }
  },20);
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

canvas.addEventListener("mousedown",function(e){
  if(e.target.closest(".node"))return;
  dragging=true;canvas.classList.add("dragging");
  dsx=e.clientX;dsy=e.clientY;dpx=panX;dpy=panY;
});
window.addEventListener("mousemove",function(e){if(!dragging)return;panX=dpx+(e.clientX-dsx);panY=dpy+(e.clientY-dsy);render()});
window.addEventListener("mouseup",function(){dragging=false;canvas.classList.remove("dragging")});
canvas.addEventListener("wheel",function(e){
  e.preventDefault();
  var d=e.deltaY>0?-0.05:0.05;
  var ns=Math.max(0.15,Math.min(2.5,scale+d));
  var rect=canvas.getBoundingClientRect();
  var mx=e.clientX-rect.left, my=e.clientY-rect.top;
  panX=mx-(mx-panX)*(ns/scale);panY=my-(my-panY)*(ns/scale);
  scale=ns;render();
},{passive:false});

function resetView(){scale=0.55;panX=40;panY=10;render()}
function expandAll(){for(var i=0;i<nodes.length;i++)nodes[i]._expanded=true;render()}
function collapseAll(){for(var i=0;i<nodes.length;i++)nodes[i]._expanded=false;render()}

render();
</script>
</body>
</html>
